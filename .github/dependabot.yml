version: 2

updates:
  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: gechr/actions

  - package-ecosystem: cargo
    cooldown:
      default-days: 7
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns:
          - "*"
